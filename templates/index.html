<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#121826;
            color:white;
            padding:40px;
        }

        .container{
            max-width:1100px;
            margin:auto;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#60a5fa;
        }

        .add-btn{
            display:inline-block;
            padding:12px 20px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .add-btn:hover{
            background:#1d4ed8;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#1e293b;
            border-radius:10px;
            overflow:hidden;
        }

        th{
            background:#334155;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #475569;
        }

        tr:hover{
            background:#2b3648;
        }

        .action-link{
            color:#60a5fa;
            text-decoration:none;
            font-weight:bold;
        }

        .action-link:hover{
            color:#93c5fd;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Student Performance Tracker</h1>

<a href="/add_student" class="add-btn">+ Add Student</a>

<table border="1">
<tr>
    <th>Name</th>
    <th>Roll Number</th>
    <th>Actions</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student.name }}</td>
    <td>{{ student.roll_number }}</td>

    <td>
        <a href="/student/{{student.id}}" class="action-link">View</a>
        |
        <a href="/add_grades/{{student.id}}" class="action-link">Add Grades</a>
    </td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
