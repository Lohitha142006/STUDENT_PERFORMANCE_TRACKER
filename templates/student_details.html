<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>

    <style>
        body{
            background:#121826;
            color:white;
            font-family:'Segoe UI',sans-serif;
        }

        .container{
            max-width:900px;
            margin:40px auto;
            background:#1e293b;
            padding:30px;
            border-radius:12px;
        }

        h1{
            color:#60a5fa;
            margin-bottom:15px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background:#0f172a;
        }

        th{
            background:#334155;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #475569;
        }

        h3{
            margin-top:20px;
            color:#93c5fd;
        }

        a{
            color:#60a5fa;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

<h1>{{student.name}}</h1>

<p>
Roll Number:
{{student.roll_number}}
</p>

<h3>Grades</h3>

<table border="1">

<tr>
    <th>Subject</th>
    <th>Marks</th>
</tr>

{% for grade in grades %}
<tr>
    <td>{{grade.subject}}</td>
    <td>{{grade.marks}}</td>
</tr>
{% endfor %}

</table>

<h3>
Average Marks:
{{average}}
</h3>

<br>

<a href="/">Back</a>

</div>

</body>
</html>
